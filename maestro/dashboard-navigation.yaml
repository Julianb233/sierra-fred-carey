appId: com.joinsahara.app
name: "Sahara Dashboard — Navigate All Core Pages"
tags:
  - critical
  - dashboard
  - P1
---

# Prerequisite: Login
- launchApp
- openLink: https://joinsahara.com/login
- tapOn:
    id: "email-input"
- inputText: ${E2E_TEST_EMAIL}
- tapOn:
    id: "password-input"
- inputText: ${E2E_TEST_PASSWORD}
- tapOn: "Sign in"
- assertVisible: "Dashboard"

# --- Dashboard Home ---
- openLink: https://joinsahara.com/dashboard
- assertVisible: "Dashboard"

# --- Next Steps ---
- openLink: https://joinsahara.com/dashboard/next-steps
- assertNotVisible: "404"
- assertNotVisible: "error"

